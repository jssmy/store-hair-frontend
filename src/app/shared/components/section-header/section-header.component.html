<header class="section-header">
    <div class="section-header__row">
        <div>
            <h1 class="section-header__title">{{ title() }}</h1>
            @if (subtitle()) {
            <p class="section-header__subtitle">{{ subtitle() }}</p>
            }
        </div>
        @if (buttonLabel()) {
        <stp-button variant="primary" btnStyle="solid" size="md" radius="md" (click)="newItem.emit()">
            <i stp-icon name="plus" style="font-size:1rem"></i>
            {{ buttonLabel() }}
        </stp-button>
        }
    </div>
</header>
