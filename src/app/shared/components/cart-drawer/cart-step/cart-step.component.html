<div class="step__header">
    <h2 class="step__title">Carrito</h2>
    <button class="close" type="button" aria-label="Cerrar carrito" (click)="close.emit()">
        <i stp-icon [autofill]="false" name="x" style="font-size: 1.25rem"></i>
    </button>
</div>

<ul class="step__list">
    @for (item of items(); track item.product.id) {
    <stp-swipe-item [options]="swipeOptions()" (optionSelected)="remove.emit(item.product.id)"
        class="step__swipe-item">
        <stp-cart-item [item]="item"
            (quantityChange)="quantityChange.emit({ productId: item.product.id, quantity: $event })"
            (remove)="remove.emit(item.product.id)" />
    </stp-swipe-item>
    }
</ul>

<div class="step__summary">
    <div class="step__summary-row">
        <span>Subtotal ({{ count() }} {{ count() === 1 ? 'producto' : 'productos' }})</span>
        <span>S/ {{ total() | number:'1.2-2' }}</span>
    </div>
    <div class="step__summary-row step__summary-row--total">
        <strong>Total</strong>
        <strong>S/ {{ total() | number:'1.2-2' }}</strong>
    </div>
</div>

<div class="step__actions">
    <stp-button variant="surface" btnStyle="outlined" radius="md" size="md" (click)="clear.emit()">
        Limpiar carrito
    </stp-button>
    <stp-button [disabled]="items().length === 0" variant="primary" btnStyle="solid" radius="md" size="md"
        (click)="checkout.emit()">
        Cobrar S/ {{ total() | number:'1.2-2' }}
    </stp-button>
</div>
