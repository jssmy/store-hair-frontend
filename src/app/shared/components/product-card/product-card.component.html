<!-- Product image -->
<div class="product-card__image-wrap" aria-hidden="true">
    @if (product().imageUrl) {
    <img class="product-card__image" [src]="product().imageUrl" [alt]="product().name" loading="lazy"
        width="120" height="120" />
    } @else {
    <div class="product-card__placeholder product-card__placeholder"
        aria-hidden="true">
        <span class="product-card__initials">{{ productInitials(product().name) }}</span>

    </div>
    }

</div>

<!-- Product info -->
<div class="product-card__body">
    <h3 class="product-card__name">{{ product().name }}</h3>
    <p class="product-card__unit">por {{ product().unit }}</p>
    <p class="product-card__price">{{ formatPrice(product().price) }}</p>
</div>
